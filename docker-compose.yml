services:
  postgres:
    image: postgres:16-alpine
    container_name: encripthor-db
    environment:
      POSTGRES_USER: encripthor
      POSTGRES_PASSWORD: encripthor123
      POSTGRES_DB: encripthor
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encripthor"]
      interval: 5s
      timeout: 5s
      retries: 5

    # ★ Servidor principal: Socket.IO + proxy para Next.js
  socket-server:
    build: ./server
    container_name: encripthor-server
    ports:
      - "3000:3000"  # Única porta pública: Socket.IO + proxy Next.js
    environment:
      DATABASE_URL: postgresql://encripthor:encripthor123@postgres:5432/encripthor
      PORT: 3000
      NEXTJS_HOST: nextjs
      NEXTJS_PORT: 3000

  nextjs:
    build: ./client
    container_name: encripthor-client
    # Sem portas públicas — acessado internamente pelo socket-server
    ports:
      - "3001:3000"  # Apenas para debug interno (não necessário)
    depends_on:
      - socket-server

volumes:
  pgdata:
