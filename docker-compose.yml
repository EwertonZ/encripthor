services:
  postgres:
    image: postgres:16-alpine
    container_name: encripthor-db
    environment:
      POSTGRES_USER: encripthor
      POSTGRES_PASSWORD: encripthor123
      POSTGRES_DB: encripthor
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encripthor"]
      interval: 5s
      timeout: 5s
      retries: 5

  socket-server:
    build: ./server
    container_name: encripthor-server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://encripthor:encripthor123@postgres:5432/encripthor
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  nextjs:
    build: ./client
    container_name: encripthor-client
    ports:
      - "3000:3000"
    # ★ Para usar com ngrok, descomente e defina a URL pública do Socket.IO:
    # environment:
    #   NEXT_PUBLIC_SOCKET_URL: https://xyz123.ngrok.io
    # Após definir, execute: docker compose build && docker compose up -d
    depends_on:
      - socket-server

  # ── Perfil de Desenvolvimento (hot-reload) ──
  socket-server-dev:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: encripthor-server-dev
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://encripthor:encripthor123@postgres:5432/encripthor
      PORT: 3001
      NODE_ENV: development
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

  nextjs-dev:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: encripthor-client-dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
      NODE_ENV: development
    volumes:
      - ./client/src:/app/src
    depends_on:
      - socket-server-dev
    profiles:
      - dev

volumes:
  pgdata:
